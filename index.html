<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<script>
  const billNoInput = document.getElementById('billNoInput');
  const billNoDisplay = document.getElementById('billNo');

  billNoInput.addEventListener('input', () => {
    billNoInput.value = billNoInput.value.replace(/\D/g, '').slice(0, 4);
    billNoDisplay.textContent = billNoInput.value || '----';
  });
  billNoDisplay.textContent = billNoInput.value;

  function downloadPDF() {
    if (typeof html2pdf === 'undefined' || typeof html2canvas === 'undefined') {
      alert('The PDF library could not load (no internet connection, or this preview is blocking it).\n\nPlease open this file directly in your browser and try again.');
      return;
    }
    const billNo = billNoInput.value || 'memo';
    const memo = document.querySelector('.memo');

    const margin = 24;
    const wrapper = document.createElement('div');
    wrapper.style.display = 'inline-block';
    wrapper.style.padding = margin + 'px';
    wrapper.style.background = '#fdfbf3';
    memo.parentNode.insertBefore(wrapper, memo);
    wrapper.appendChild(memo);

    html2canvas(wrapper, { scale: 3, backgroundColor: '#fdfbf3', useCORS: true }).then(canvas => {
      wrapper.parentNode.insertBefore(memo, wrapper);
      wrapper.remove();

      const imgData = canvas.toDataURL('image/jpeg', 0.98);
      const pxToMm = 25.4 / 96;
      const widthMm = (canvas.width / 3) * pxToMm;
      const heightMm = (canvas.height / 3) * pxToMm;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        unit: 'mm',
        format: [widthMm, heightMm],
        orientation: widthMm > heightMm ? 'landscape' : 'portrait'
      });
      pdf.addImage(imgData, 'JPEG', 0, 0, widthMm, heightMm);
      pdf.save(`RajalakshmiServiceStation_${billNo}.pdf`);
    }).catch(err => {
      if (wrapper.parentNode) {
        wrapper.parentNode.insertBefore(memo, wrapper);
        wrapper.remove();
      }
      alert('PDF generation failed: ' + err.message + '\n\nTry opening this file directly in a browser tab instead of a preview window.');
    });
  }
</script>
