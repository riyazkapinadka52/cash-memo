<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rajalakshmi Service Station - Cash Memo</title>
<style>
  @page { size: A5; margin: 10mm; }
  * { box-sizing: border-box; }
  body {
    font-family: 'Times New Roman', Times, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #e9e9e9;
  }
  .controls {
    width: 520px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-family: Arial, sans-serif;
  }
  .controls button {
    padding: 8px 14px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid #333;
    background: #fff;
    border-radius: 4px;
  }
  .controls button:hover { background: #eee; }
  .memo {
    width: 520px;
    border: 3px solid #000;
    padding: 22px 26px 18px;
    background: #fdfbf3;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 15px;
    margin-bottom: 2px;
  }
  .cash-memo-label {
    text-decoration: underline;
    font-weight: bold;
    font-size: 16px;
  }
  .gstin-line {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .shop-name {
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.2px;
    white-space: nowrap;
    text-shadow: 0.4px 0 0 currentColor, -0.4px 0 0 currentColor;
    margin: 6px 0 8px;
  }
  .no-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .no-row .no-box {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 17px;
  }
  .no-row .no-box span {
    color: #a3241a;
    font-weight: bold;
    font-size: 26px;
    font-family: 'Times New Roman', Times, serif;
    margin-left: 6px;
  }
  .dealer-address {
    text-align: right;
    font-size: 17px;
    line-height: 1.3;
  }
  .dealer-address .bpc {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
  }
  .vehicle-row {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    margin-bottom: 4px;
    display: flex;
    align-items: baseline;
    border-bottom: 1.5px solid #000;
    padding-bottom: 6px;
  }
  .vehicle-row input, .field-input {
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 17px;
    padding: 2px 4px;
  }
  .vehicle-row input { flex: 1; margin-left: 8px; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0;
    border: 2px solid #000;
  }
  th, td {
    border-left: 1.5px solid #000;
    border-right: 1.5px solid #000;
    font-size: 15px;
  }
  th {
    padding: 8px 10px;
    font-weight: bold;
    font-family: Arial, Helvetica, sans-serif;
    text-align: left;
    border-top: 1.5px solid #000;
    border-bottom: 1.5px solid #000;
  }
  table tr:last-child td {
    border-bottom: 1.5px solid #000;
  }
  table tr:nth-child(2) td {
    border-top: none;
  }
  td {
    height: 44px;
    padding: 6px 10px;
    vertical-align: top;
    font-family: Arial, Helvetica, sans-serif;
  }
  .particulars-col { width: 46%; }
  .rate-col { width: 26%; }
  .amount-col { width: 28%; }
  td.rate-col {
    position: relative;
  }
  td.rate-col::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    right: 12px;
    width: 1.5px;
    background: #000;
  }
  td input {
    border: none;
    border-bottom: 1px dotted #777;
    background: transparent;
    font-family: 'Times New Roman', Times, serif;
    font-size: 16px;
    width: 100%;
  }
  .qty-input { width: 60px; border-bottom: 1px dotted #777; }
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 10px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
  }
  .sign-line {
    text-align: right;
    font-size: 15px;
  }
  .sign-line .line {
    display: block;
    width: 150px;
    border-bottom: 1px solid #000;
    height: 42px;
  }
  @media print {
    .controls { display: none; }
    body { background: #fff; padding: 0; }
    .memo { border: 3px solid #000; }
  }
</style>
</head>
<body>

  <div class="controls">
    <div style="display:flex; align-items:center; gap:8px;">
      <label for="billNoInput" style="font-size:14px;">Bill No.:</label>
      <input type="text" id="billNoInput" maxlength="4" inputmode="numeric" value="2337"
        style="width:60px; padding:6px; font-size:14px; border:1px solid #333; border-radius:4px; text-align:center;">
    </div>
    <button onclick="downloadPDF()">⬇️ Download PDF</button>
  </div>

  <div class="memo">
    <div class="top-row">
      <div>M. : 9741134125</div>
      <div class="cash-memo-label">CASH MEMO</div>
    </div>
    <div class="gstin-line">GSTIN : 29ABAFR6002J1Z8</div>

    <div class="shop-name">RAJALAKSHMI SERVICE STATION</div>

    <div class="no-row">
      <div class="no-box">No. <span id="billNo">2337</span></div>
      <div class="dealer-address">
        <div class="bpc">B.P.C. Dealers</div>
        <div>N.H. 66, Koteshwar - 576 222</div>
      </div>
    </div>

    <div class="vehicle-row">Vehicle No.<input type="text" id="vehicleNo" placeholder=""></div>

    <table>
      <tr>
        <th class="particulars-col">Particulars</th>
        <th class="rate-col">Rate</th>
        <th class="amount-col">Amount</th>
      </tr>
      <tr>
        <td>Petrol <input type="text" class="qty-input" id="petrolQty"> Ltrs</td>
        <td class="rate-col"><input type="text" id="petrolRate"></td>
        <td><input type="text" id="petrolAmt"></td>
      </tr>
      <tr>
        <td>H.S.D <input type="text" class="qty-input" id="hsdQty"> Ltrs</td>
        <td class="rate-col"><input type="text" id="hsdRate"></td>
        <td><input type="text" id="hsdAmt"></td>
      </tr>
      <tr>
        <td style="height:130px;"></td>
        <td class="rate-col"></td>
        <td style="vertical-align:bottom;"><input type="text" id="totalAmt"></td>
      </tr>
    </table>

    <div class="bottom-row">
      <div>Date <input type="text" id="billDate" class="field-input" style="width:110px;"></div>
      <div class="sign-line">
        <span class="line"></span>
        Signature
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script>
    const billNoInput = document.getElementById('billNoInput');
    const billNoDisplay = document.getElementById('billNo');

    // keep the printed "No." in sync with whatever the user types
    billNoInput.addEventListener('input', () => {
      // only allow digits, max 4
      billNoInput.value = billNoInput.value.replace(/\D/g, '').slice(0, 4);
      billNoDisplay.textContent = billNoInput.value || '----';
    });
    billNoDisplay.textContent = billNoInput.value;

    function downloadPDF() {
      if (typeof html2pdf === 'undefined') {
        alert('The PDF library could not load (no internet connection, or this preview is blocking it).\n\nPlease download this HTML file and open it directly in your browser (Chrome/Edge), then click Download PDF again.');
        return;
      }
      const billNo = billNoInput.value || 'memo';
      const memo = document.querySelector('.memo');
      const opt = {
        margin: 0,
        filename: `RajalakshmiServiceStation_${billNo}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 3, backgroundColor: '#fdfbf3' },
        jsPDF: { unit: 'mm', format: 'a5', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(memo).save().catch(err => {
        alert('PDF generation failed: ' + err.message + '\n\nTry opening this file directly in a browser tab instead of a preview window.');
      });
    }
  </script>

</body>
</html>
